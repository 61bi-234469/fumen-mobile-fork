name: dev-workflow
on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
      - run: yarn install --frozen-lockfile
      - run: yarn test-ci
      - run: yarn webpack-prod
        env:
          DEBUG_ON: false
      - run: mkdir -p logs
      - run: yarn serve > logs/serve.log 2> logs/serve.err.log &
      - run: yarn cy-run-ci
      - uses: actions/upload-artifact@v5
        if: ${{ failure() }}
        with:
          name: cypress-debug-artifacts
          path: |
            cypress/screenshots/
            logs/
          if-no-files-found: warn
